[workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
pip = "*"
htcondor = "*"
click = "*"
pydantic = "*"
zstandard = "*"
pytest = "*"
ruff = "*"
mypy = "*"
rich = "*"

[pypi-dependencies]
htcondor-accounting = { path = ".", editable = true }

[tasks]
hello = "htcondor-accounting hello"
test = "python -m pytest"
lint = "ruff check ."
typecheck = "mypy src"
