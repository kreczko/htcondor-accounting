[workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
pip = "*"
htcondor = "*"
click = "*"
pydantic = "*"
zstandard = "*"
pytest = "*"
ruff = "*"
mypy = "*"
rich = "*"

[pypi-dependencies]
htcondor-accounting = { path = ".", editable = true }

[tasks]
hello = "htcondor-accounting hello"
test = "python -m pytest"
lint = "ruff check ."
typecheck = "mypy src"

clean-archive = "rm -rf archive"
show-config = "htcondor-accounting show-config"

run-snapshot = "scripts/run_snapshot.sh"
run-extract = "scripts/run_extract.sh"
run-daily = "scripts/run_daily.sh"
run-apel = "scripts/run_apel.sh"
daily-pipeline = "scripts/run_daily_pipeline.sh"
